name: Shipcheck CI

on:
  pull_request:
  push:
    branches:
      - main
      - stage

jobs:
  shipcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Shipcheck quick
        run: pnpm shipcheck:quick

      - name: DB safety
        run: pnpm db:safety

      - name: Governance checks
        run: pnpm governance:check

      - name: Web unit tests
        run: pnpm --filter @illuvrse/web test:unit

  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Runtime readiness
        run: node scripts/check-platform-runtime-readiness.mjs

      - name: SLO evaluation
        run: node scripts/evaluate-slos.mjs --fixture ops/fixtures/observability-summary.ci.json

      - name: Web smoke tests
        run: pnpm --filter @illuvrse/web test:smoke

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @illuvrse/web exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm test:e2e:smoke
