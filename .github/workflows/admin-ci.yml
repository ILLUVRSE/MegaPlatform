name: Admin CI

on:
  pull_request:
    branches: ["main"]

jobs:
  admin-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: illuvrse_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/illuvrse_admin?schema=public
      NEXTAUTH_SECRET: test-secret-please-change
      NEXTAUTH_URL: http://localhost:3000
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 120000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @illuvrse/db prisma:generate

      - name: Prisma validate
        run: pnpm --filter @illuvrse/db exec prisma validate --schema schema.prisma

      - name: Prisma migrate status
        run: pnpm --filter @illuvrse/db exec prisma migrate status --schema schema.prisma

      - name: Migrate database
        run: pnpm --filter @illuvrse/db prisma:migrate -- --name ci

      - name: Seed database
        run: pnpm --filter @illuvrse/db prisma:seed

      - name: Lint
        run: pnpm --filter @illuvrse/web lint

      - name: Typecheck
        run: pnpm --filter @illuvrse/web exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter @illuvrse/web test

      - name: Build
        run: pnpm --filter @illuvrse/web build

      - name: Install Playwright browsers
        run: pnpm --filter @illuvrse/web exec playwright install --with-deps

      - name: Start dev server
        run: pnpm --filter @illuvrse/web dev -- --port 3000 &

      - name: Wait for app
        run: pnpm dlx wait-on http://localhost:3000/auth/signin

      - name: E2E tests
        run: pnpm --filter @illuvrse/web test:e2e
